<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culinary Journey - Restaurants</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">


    </style>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./style.css">
    <style>
        /* Inline overrides for this page specifically if needed */
        .header {
            padding: 15px 0;
            /* Smaller header for dashboard */
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header class="header">
        <div class="container navbar">
            <nav>
                <ul class="navbar-list">
                    <li><a href="index.html" class="navbar-link">Home</a></li>
                    <li><a href="restaurants.html" class="navbar-link" style="color: var(--sage-green);">Restaurants</a>
                    </li>
                    <li><a href="index.html#categories" class="navbar-link">Cuisines</a></li>
                    <li><a href="#" class="navbar-link">Orders</a></li>
                </ul>
            </nav>

            <div class="navbar-right">
                <div class="user-profile" style="display: flex; align-items: center; gap: 10px;">
                    <!-- Avatar -->
                    <img src="https://ui-avatars.com/api/?name=User&background=678E76&color=fff" alt="User"
                        style="width: 35px; height: 35px; border-radius: 50%;">
                    <span style="font-weight: 700; font-size: 0.9rem;">My Account</span>
                </div>
            </div>

            <div class="menu-toggle">
                <ion-icon name="menu-outline"></ion-icon>
            </div>
        </div>
    </header>

    <main class="listing-container">

        <!-- Sidebar -->
        <aside class="filters-sidebar">
            <div class="filter-group">
                <h4 class="filter-title">Cuisines</h4>
                <label class="filter-option">
                    <input type="checkbox" name="cuisine" value="Italian"> Italian
                </label>
                <label class="filter-option">
                    <input type="checkbox" name="cuisine" value="Asian"> Asian
                </label>
                <label class="filter-option">
                    <input type="checkbox" name="cuisine" value="Mexican"> Mexican
                </label>
                <label class="filter-option">
                    <input type="checkbox" name="cuisine" value="Cafe"> Cafe
                </label>
            </div>

            <div class="filter-group">
                <h4 class="filter-title">Price Range</h4>
                <label class="filter-option">
                    <input type="checkbox" name="price" value="$">$
                </label>
                <label class="filter-option">
                    <input type="checkbox" name="price" value="$$">$$
                </label>
                <label class="filter-option">
                    <input type="checkbox" name="price" value="$$$">$$$
                </label>
            </div>

            <div class="filter-group">
                <h4 class="filter-title">Rating</h4>
                <label class="filter-option">
                    <input type="checkbox" name="rating" value="4.5"> 4.5+ Stars
                </label>
                <label class="filter-option">
                    <input type="checkbox" name="rating" value="4.0"> 4.0+ Stars
                </label>
            </div>
        </aside>

        <!-- Results -->
        <section class="results-area">
            <div class="results-header">
                <div class="results-count">Showing <span id="count">0</span> Restaurants</div>

                <div class="sort-options">
                    <select style="padding: 8px; border-radius: 6px; border: 1px solid #ccc;">
                        <option>Recommended</option>
                        <option>Rating: High to Low</option>
                        <option>Delivery Time</option>
                    </select>
                </div>
            </div>

            <div class="restaurant-grid" id="restaurant-grid">
                <!-- JS will populate this -->
            </div>
        </section>

    </main>


    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <script src="./script.js"></script>
    <script>
        // Temporary inline script specific to this page logic if not in main script
        // But we will use main script.js to handle logic based on page location.
    </script>
</body>

</html>
